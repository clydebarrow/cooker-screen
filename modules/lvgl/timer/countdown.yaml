---
# Countdown timer: popup over the bottom half to set minutes/seconds,
# a countdown that replaces the clock, and a distinct bip-bip-bip alarm.
# Implemented with inbuilt ESPHome/LVGL features in preference to lambdas.

globals:
  - id: timer_running
    type: bool
    restore_value: false
    initial_value: "false"
  - id: timer_remaining
    type: int
    restore_value: false
    initial_value: "0"

script:
  # Tapping the clock: while a timer runs, a tap stops it; otherwise open the popup.
  - id: timer_tap
    then:
      - if:
          condition:
            lambda: "return id(timer_running);"
          then:
            - script.execute: timer_stop
          else:
            - lvgl.widget.show: timer_popup

  # Paint the remaining time into the clock labels (mm over ss).
  - id: timer_show
    then:
      - lvgl.label.update:
          id: lv_time_hours
          text:
            format: "%02d"
            args: ["id(timer_remaining) / 60"]
      - lvgl.label.update:
          id: lv_time_minutes
          text:
            format: "%02d"
            args: ["id(timer_remaining) % 60"]

  # Count down once per second, then raise the alarm.
  - id: timer_run
    mode: restart
    then:
      - lambda: "id(timer_running) = true;"
      - lvgl.widget.update:
          id: lv_time_1
          text_color: $button_on_color
      - while:
          condition:
            lambda: "return id(timer_remaining) > 0;"
          then:
            - script.execute: timer_show
            - delay: 1s
            - lambda: "id(timer_remaining) -= 1;"
      - script.execute: timer_show
      - script.execute: timer_flash
      - script.execute: timer_alarm

  # A short triple beep: bip-bip-bip (distinct from other alarm cadences).
  - id: timer_bips
    then:
      - switch.turn_on: buzzer
      - delay: 120ms
      - switch.turn_off: buzzer
      - delay: 120ms
      - switch.turn_on: buzzer
      - delay: 120ms
      - switch.turn_off: buzzer
      - delay: 120ms
      - switch.turn_on: buzzer
      - delay: 120ms
      - switch.turn_off: buzzer

  # Repeat the triple beep once a second for up to 30s, then stop beeping.
  # The flashing (timer_flash) keeps going until dismissed by a touch.
  - id: timer_alarm
    mode: restart
    then:
      - repeat:
          count: 30
          then:
            - script.execute: timer_bips
            - script.wait: timer_bips
            - delay: 1s
      - switch.turn_off: buzzer

  # Flash the timer background; runs until timer_stop is called by a touch.
  - id: timer_flash
    mode: restart
    then:
      - while:
          condition:
            lambda: "return true;"
          then:
            - lvgl.widget.update:
                id: lv_time_1
                bg_color: $button_on_color
                bg_opa: COVER
                text_color: black
            - delay: 500ms
            - lvgl.widget.update:
                id: lv_time_1
                bg_opa: TRANSP
                text_color: $time_color
            - delay: 500ms

  # Stop everything and restore the normal clock display.
  - id: timer_stop
    then:
      - script.stop: timer_run
      - script.stop: timer_alarm
      - script.stop: timer_bips
      - script.stop: timer_flash
      - switch.turn_off: buzzer
      - lambda: |-
          id(timer_running) = false;
          id(timer_remaining) = 0;
      - lvgl.widget.update:
          id: lv_time_1
          bg_opa: TRANSP
          text_color: $time_color
      - script.execute: time_update

# Popup placed on the top layer so it floats over the bottom half of the page.
